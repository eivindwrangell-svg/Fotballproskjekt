    <script>
        //fixtures list antall

        //pl
        const plContainerEl = document.getElementById("pl")
        const plList = plContainerEl.querySelector(".fixtures-list")
        const plAntall = plList.children.length;
        const plDisplayedNumber = document.querySelector(".pl-ant-fixtures")
        plDisplayedNumber.innerHTML = plAntall

        //cl
        const clContainerEl = document.getElementById("cl")
        const clList = clContainerEl.querySelector(".fixtures-list")
        const clAntall = clList.children.length;
        const clDisplayedNumber = document.querySelector(".cl-ant-fixtures")
        clDisplayedNumber.innerHTML = clAntall

        //bl
        const blContainerEl = document.getElementById("bl")
        const blList = blContainerEl.querySelector(".fixtures-list")
        const blAntall = blList.children.length;
        const blDisplayedNumber = document.querySelector(".bl-ant-fixtures")
        blDisplayedNumber.innerHTML = blAntall

        //--- fixtures list antall slutt


        //display fixtures

        function displayFixtures(e) {
            const containerEl = e.parentElement
            const fixturesList = containerEl.querySelector(".fixtures-list")
            const pilOpp = e.querySelector(".pil-opp")
            const pilNed = e.querySelector(".pil-ned")

            if (fixturesList.style.display === "flex") {
                fixturesList.style.display = "none"
                pilOpp.style.display = "block"
                pilNed.style.display = "none"
            }
            else {
                fixturesList.style.display = "flex"
                pilOpp.style.display = "none"
                pilNed.style.display = "block"
                e.parentElement.style.height = "auto"
            }
        }



    </script>
